<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🧙‍♂️ 옐미의 마법학교 입학허가증</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{
            background:#0a0a2e;min-height:100vh;min-height:-webkit-fill-available;
            display:-webkit-flex;display:flex;
            -webkit-justify-content:center;justify-content:center;
            -webkit-align-items:flex-start;align-items:flex-start;
            padding:20px 0 60px;font-family:'Gaegu',cursive;
            overflow-x:hidden;-webkit-font-smoothing:antialiased;
        }
        html{height:-webkit-fill-available}

        /* 별 */
        .star{position:fixed;background:#fff;border-radius:50%;pointer-events:none;z-index:0;
            -webkit-animation:tw var(--d) ease-in-out infinite;animation:tw var(--d) ease-in-out infinite}
        @-webkit-keyframes tw{0%,100%{opacity:.15}50%{opacity:.8}}
        @keyframes tw{0%,100%{opacity:.15}50%{opacity:.8}}

        /* 반딧불 */
        .firefly{position:fixed;width:6px;height:6px;background:#ffd700;border-radius:50%;
            box-shadow:0 0 10px #ffd700,0 0 20px #ffd700;pointer-events:none;z-index:1;
            -webkit-animation:ff var(--d) ease-in-out infinite;animation:ff var(--d) ease-in-out infinite}
        @-webkit-keyframes ff{0%{-webkit-transform:translate(0,0);opacity:0}10%{opacity:1}50%{-webkit-transform:translate(var(--tx),var(--ty));opacity:.8}100%{-webkit-transform:translate(var(--tx2),var(--ty2));opacity:0}}
        @keyframes ff{0%{transform:translate(0,0);opacity:0}10%{opacity:1}50%{transform:translate(var(--tx),var(--ty));opacity:.8}100%{transform:translate(var(--tx2),var(--ty2));opacity:0}}

        /* 프로그레스 */
        .progress-bar{position:fixed;top:0;left:0;height:3px;
            background:linear-gradient(90deg,#ffd700,#ffaa00);
            -webkit-transition:width .5s ease;transition:width .5s ease;
            z-index:100;box-shadow:0 0 10px rgba(255,215,0,.5)}

        /* 컨테이너 */
        .container{position:relative;z-index:10;width:92%;max-width:620px;padding:20px 0}

        /* 메인 카드 */
        .card{
            background:linear-gradient(145deg,#1a1a4e,#2a1a3e);
            border:2px solid #ffd700;border-radius:20px;padding:35px 24px;
            box-shadow:0 0 30px rgba(255,215,0,.15);
            position:relative;overflow:hidden;
            -webkit-animation:cardIn .8s ease-out;animation:cardIn .8s ease-out;
        }
        .card::before{
            content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
            background:radial-gradient(circle,rgba(255,215,0,.03) 0%,transparent 70%);
            -webkit-animation:shimmer 4s ease-in-out infinite;animation:shimmer 4s ease-in-out infinite;
        }
        @-webkit-keyframes shimmer{0%,100%{-webkit-transform:rotate(0)}50%{-webkit-transform:rotate(180deg)}}
        @keyframes shimmer{0%,100%{transform:rotate(0)}50%{transform:rotate(180deg)}}
        @-webkit-keyframes cardIn{from{opacity:0;-webkit-transform:translateY(30px) scale(.95)}to{opacity:1;-webkit-transform:translateY(0) scale(1)}}
        @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

        .si{text-align:center;margin-bottom:12px;font-size:14px;color:#ffd700;letter-spacing:3px;opacity:.7;position:relative;z-index:1}
        .ct{text-align:center;color:#ffd700;font-size:28px;font-weight:700;margin-bottom:18px;text-shadow:0 0 20px rgba(255,215,0,.3);position:relative;z-index:1}
        .ct .em{font-size:42px;display:block;margin-bottom:10px}
        .tx{color:#e8d5f5;font-size:19px;line-height:1.85;margin-bottom:22px;text-align:center;position:relative;z-index:1;word-break:keep-all}
        .hl{color:#ffd700;font-weight:700}

        /* ===== 플립 카드 그리드 ===== */
        .flip-grid{
            display:-webkit-flex;display:flex;
            -webkit-flex-wrap:wrap;flex-wrap:wrap;
            gap:14px;-webkit-justify-content:center;justify-content:center;
            position:relative;z-index:1;margin-bottom:16px;
        }

        .flip-card{
            width:calc(50% - 7px);max-width:230px;height:240px;
            -webkit-perspective:1000px;perspective:1000px;
            cursor:pointer;
        }

        .flip-inner{
            position:relative;width:100%;height:100%;
            -webkit-transition:-webkit-transform .7s cubic-bezier(.4,.2,.2,1);
            transition:transform .7s cubic-bezier(.4,.2,.2,1);
            -webkit-transform-style:preserve-3d;transform-style:preserve-3d;
        }
        .flip-card.flipped .flip-inner{
            -webkit-transform:rotateY(180deg);transform:rotateY(180deg);
        }

        .flip-front,.flip-back{
            position:absolute;top:0;left:0;width:100%;height:100%;
            -webkit-backface-visibility:hidden;backface-visibility:hidden;
            border-radius:16px;overflow:hidden;
        }

        /* 카드 앞면 */
        .flip-front{
            background:linear-gradient(160deg,#1a0a3e,#0d0628,#1a0a3e);
            border:2px solid #ffd700;
            display:-webkit-flex;display:flex;
            -webkit-flex-direction:column;flex-direction:column;
            -webkit-align-items:center;align-items:center;
            -webkit-justify-content:center;justify-content:center;
            padding:20px;text-align:center;z-index:2;
        }
        .flip-front::before{
            content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;
            border:1px solid rgba(255,215,0,.3);border-radius:12px;pointer-events:none;
        }
        .flip-front::after{
            content:'';position:absolute;top:0;left:0;right:0;bottom:0;
            background:
                radial-gradient(circle at 12px 12px,rgba(255,215,0,.4) 0%,transparent 8px),
                radial-gradient(circle at calc(100% - 12px) 12px,rgba(255,215,0,.4) 0%,transparent 8px),
                radial-gradient(circle at 12px calc(100% - 12px),rgba(255,215,0,.4) 0%,transparent 8px),
                radial-gradient(circle at calc(100% - 12px) calc(100% - 12px),rgba(255,215,0,.4) 0%,transparent 8px);
            pointer-events:none;border-radius:16px;
        }

        .front-shimmer{
            position:absolute;top:0;left:-100%;width:60%;height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,215,0,.06),transparent);
            -webkit-animation:fsh 3s ease-in-out infinite;animation:fsh 3s ease-in-out infinite;
            pointer-events:none;
        }
        @-webkit-keyframes fsh{0%{left:-100%}50%{left:100%}100%{left:100%}}
        @keyframes fsh{0%{left:-100%}50%{left:100%}100%{left:100%}}

        .front-deco{
            width:60px;height:60px;border:2px solid rgba(255,215,0,.5);
            -webkit-transform:rotate(45deg);transform:rotate(45deg);
            display:-webkit-flex;display:flex;
            -webkit-align-items:center;align-items:center;
            -webkit-justify-content:center;justify-content:center;
            margin-bottom:12px;position:relative;
        }
        .front-deco::before{
            content:'';position:absolute;top:4px;left:4px;right:4px;bottom:4px;
            border:1px solid rgba(255,215,0,.25);
        }
        .front-deco .deco-icon{
            -webkit-transform:rotate(-45deg);transform:rotate(-45deg);font-size:24px;
        }
        .front-label{color:rgba(255,215,0,.5);font-size:11px;letter-spacing:3px;margin-top:4px}
        .front-mystery{color:#ffd700;font-size:28px;font-weight:700;text-shadow:0 0 15px rgba(255,215,0,.4);margin-top:2px}

        /* 카드 뒷면 */
        .flip-back{
            background:linear-gradient(160deg,#1a1a4e,#12103a,#1e1650);
            border:2px solid #ffd700;
            -webkit-transform:rotateY(180deg);transform:rotateY(180deg);z-index:1;
            display:-webkit-flex;display:flex;
            -webkit-flex-direction:column;flex-direction:column;
            -webkit-align-items:center;align-items:center;
            -webkit-justify-content:center;justify-content:center;
            padding:18px 14px;text-align:center;
        }
        .flip-back::before{
            content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;
            border:1px solid rgba(255,215,0,.2);border-radius:12px;pointer-events:none;
        }

        .back-line{width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.4),transparent)}
        .back-icon{font-size:36px;margin:8px 0}
        .back-desc{color:#e8d5f5;font-size:16px;line-height:1.55;word-break:keep-all;margin:8px 0;position:relative;z-index:1}

        .select-btn{
            display:none;
            background:linear-gradient(135deg,#ffd700,#f0c040);
            border:none;border-radius:20px;padding:9px 22px;color:#1a1a2e;
            font-family:'Gaegu',cursive;font-size:16px;font-weight:700;
            cursor:pointer;margin-top:6px;
            -webkit-appearance:none;appearance:none;
            box-shadow:0 2px 10px rgba(255,215,0,.3);
            position:relative;z-index:2;letter-spacing:.5px;
        }
        .flip-card.flipped .select-btn{display:inline-block}
        .select-btn:active{-webkit-transform:scale(.93);transform:scale(.93)}

        .select-hint{text-align:center;color:rgba(255,215,0,.45);font-size:15px;margin-top:8px;position:relative;z-index:1}

        @media(hover:hover){
            .flip-card:not(.flipped):hover .flip-front{box-shadow:0 0 25px rgba(255,215,0,.2)}
        }
        .flip-card:not(.flipped):active .flip-front{box-shadow:0 0 25px rgba(255,215,0,.2)}

        /* 일반 버튼 */
        .btn{
            background:linear-gradient(135deg,#ffd700,#f0c040);
            border:none;border-radius:30px;padding:14px 40px;color:#1a1a2e;
            font-family:'Gaegu',cursive;font-size:20px;font-weight:700;
            cursor:pointer;box-shadow:0 2px 15px rgba(255,215,0,.3);
            display:block;margin:0 auto;position:relative;z-index:1;
            -webkit-appearance:none;appearance:none;
            -webkit-transition:all .2s;transition:all .2s;
        }
        .btn:active{-webkit-transform:scale(.95);transform:scale(.95)}

        /* 결과 */
        .re{font-size:50px;text-align:center;margin-bottom:15px;position:relative;z-index:1}
        .rt{color:#ffd700;font-size:24px;font-weight:700;text-align:center;margin-bottom:15px;position:relative;z-index:1}
        .rp{color:#fff;font-size:26px;font-weight:700;margin:15px auto;padding:12px 20px;background:rgba(255,215,0,.1);border-radius:12px;border:1px dashed #ffd700;text-align:center;max-width:400px;position:relative;z-index:1}
        .rx{color:#e8d5f5;font-size:18px;line-height:1.7;margin-bottom:22px;text-align:center;position:relative;z-index:1;word-break:keep-all}

        /* 엔딩 */
        .et{color:#ffd700;font-size:32px;font-weight:700;text-align:center;margin-bottom:20px;text-shadow:0 0 20px rgba(255,215,0,.4)}
        .ex{color:#e8d5f5;font-size:20px;line-height:2;text-align:center;word-break:keep-all}
        .ed{color:#ffd700;font-size:16px;margin-top:25px;opacity:.7;text-align:center}
        .js{margin-top:20px;padding:20px;background:rgba(255,215,0,.05);border-radius:15px;border:1px solid rgba(255,215,0,.2)}
        .js h3{color:#ffd700;font-size:20px;margin-bottom:15px;text-align:center}
        .ji{color:#e8d5f5;font-size:17px;padding:6px 0;text-align:center}

        @media(max-width:480px){
            .card{padding:28px 18px}
            .ct{font-size:24px}.ct .em{font-size:36px}
            .tx{font-size:17px}
            .flip-card{height:220px}
            .back-desc{font-size:14px}
            .back-icon{font-size:30px}
            .select-btn{font-size:14px;padding:8px 18px}
            .rp{font-size:22px}
            .et{font-size:26px}.ex{font-size:17px}
        }
        @media(max-width:370px){
            .flip-card{height:200px}
            .back-desc{font-size:13px}
            .front-deco{width:50px;height:50px}
            .front-mystery{font-size:24px}
        }

        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:#0a0a2e}
        ::-webkit-scrollbar-thumb{background:#ffd700;border-radius:3px}
    </style>
</head>
<body>
<div class="progress-bar" id="pb"></div>
<div class="stars" id="stars"></div>
<div class="container" id="gc"></div>

<script>
// ===== 배경 =====
(function(){
    var s=document.getElementById('stars');
    for(var i=0;i<70;i++){var d=document.createElement('div');d.className='star';var z=Math.random()*2+.5;
    d.style.cssText='width:'+z+'px;height:'+z+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(Math.random()*3+2)+'s;animation-delay:'+Math.random()*3+'s';s.appendChild(d)}
    for(var i=0;i<6;i++){var f=document.createElement('div');f.className='firefly';
    f.style.cssText='top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(Math.random()*6+4)+'s;--tx:'+(Math.random()*200-100)+'px;--ty:'+(Math.random()*200-100)+'px;--tx2:'+(Math.random()*200-100)+'px;--ty2:'+(Math.random()*200-100)+'px;animation-delay:'+Math.random()*5+'s';
    document.body.appendChild(f)}
})();

// ===== 상태 =====
var J=[];
var prev='';
var skippedCafe=false;

function prog(n){document.getElementById('pb').style.width=(n/8)*100+'%'}
function R(h){document.getElementById('gc').innerHTML='<div class="card">'+h+'</div>';window.scrollTo(0,0)}
function flip(el){if(el.classList.contains('flipped')){el.classList.remove('flipped')}else{el.classList.add('flipped')}}

function makeCard(num,frontEmoji,backIcon,backDesc,onSelect,delay){
    var labels=['','I','II','III','IV','V','VI'];
    var dl=delay||0;
    return '<div class="flip-card" onclick="flip(this)">'+
        '<div class="flip-inner">'+
            '<div class="flip-front">'+
                '<div class="front-shimmer" style="-webkit-animation-delay:'+dl+'s;animation-delay:'+dl+'s"></div>'+
                '<div class="front-deco"><span class="deco-icon">✦</span></div>'+
                '<div class="front-mystery">?</div>'+
                '<div class="front-label">CARD '+(labels[num]||num)+'</div>'+
            '</div>'+
            '<div class="flip-back">'+
                '<div class="back-line"></div>'+
                '<div class="back-icon">'+backIcon+'</div>'+
                '<div class="back-desc">'+backDesc+'</div>'+
                '<div class="back-line"></div>'+
                '<button class="select-btn" onclick="event.stopPropagation();'+onSelect+'">여기로 갈래!</button>'+
            '</div>'+
        '</div>'+
    '</div>';
}

function prevMsg(stage){
    var m={
        3:{'아마 홍대점':'이국의 향신료 덕분에 몸이 따뜻해진','스니커즈 버거클럽':'버거로 에너지를 가득 채운','소금제면소':'바다의 마법 면을 먹고 개운해진','오레타치카레':'진한 마법 소스로 기운을 차린'},
        4:{'_cafe':'하얀 정령들의 축복을 받은','_skip':''},
        5:{'트릭아이 뮤지엄':'환영술을 배워 눈이 반짝이는','액티브 아레나':'결투 훈련으로 몸이 뜨거운','액티브모드':'빛의 마법으로 온몸이 빛나는'},
        6:{'저스트단비':'달콤한 간식으로 행복해진','943 킹스크로스':'진짜 마법사 기분이 된'},
        7:{'알페로':'근사한 만찬으로 배가 부른','두리반':'따뜻한 가정식으로 마음이 포근한','38도씨 식당':'별빛 파스타로 낭만 가득한','신선화로':'불꽃 고기로 에너지가 넘치는'}
    };
    if(!m[stage])return '';
    if(stage===4){return skippedCafe?'':m[4]['_cafe']}
    return m[stage][prev]||'';
}

// ===== 인트로 =====
function intro(){
    prog(0);
    R(
        '<div class="ct"><span class="em">🦉✉️</span>입학 허가증이 도착했어요!</div>'+
        '<div class="tx">'+
            '<span class="hl">옐미</span>에게,<br><br>'+
            '축하해요! 당신은 <span class="hl">홍대 마법학교</span>에<br>'+
            '정식으로 입학 허가되었습니다!<br><br>'+
            '...그런데 부엉이가 길을 잃어서<br>'+
            '이 편지가 좀 늦었대요. 미안하대. 🦉💦<br><br>'+
            '<span class="hl">5월 22일</span>, 모험이 시작됩니다.<br>'+
            '준비됐죠?'+
        '</div>'+
        '<button class="btn" onclick="s1()">📜 입학허가증 펼치기</button>'
    );
}

// ===== Ch.1 무인공방 (가짜선택) =====
function s1(){
    prog(1);
    R(
        '<div class="si">✦ CHAPTER 1 ✦</div>'+
        '<div class="ct"><span class="em">🧪</span>마법 물약 수업</div>'+
        '<div class="tx">'+
            '입학 첫날, 모든 신입생은<br>'+
            '<span class="hl">마법 물약 조제 수업</span>을 들어야 해요.<br><br>'+
            '교수님이 말했어요.<br>'+
            '"오늘은 특별한 물약을 직접 만들어볼 거예요.<br>'+
            '두 가지 과정 중 하나를 선택하세요."<br><br>'+
            '책상 위에 두 장의 카드가 놓여있어요.'+
        '</div>'+
        '<div class="flip-grid">'+
            makeCard(1,'✦','🧪','비밀 레시피로<br>나만의 <strong>마법 물약</strong>을<br>조제해보는 수업','s1r("potion")',0)+
            makeCard(2,'✦','⚗️','금지된 <strong>엘릭서</strong>를<br>연금술로 빚어보는<br>비밀 수업','s1r("elixir")',.5)+
        '</div>'+
        '<div class="select-hint">카드를 눌러 뒤집어보세요!</div>'
    );
}

function s1r(type){
    J.push({stage:1,place:'무인공방',label:'🧪 물약수업'});prev='무인공방';
    var tx=type==='potion'
        ?'옐미가 과일과 꽃을 조심조심 섞자<br>병 속에서 신비한 빛이 피어올라요!<br><br>"오오... 이 색깔은 대성공이에요!"<br>교수님이 엄지를 치켜세웠어요. 👍✨'
        :'옐미가 비밀 재료를 한 방울 떨어뜨리자<br>황금빛 기운이 병을 감싸요!<br><br>"이런 엘릭서는 처음 봐요...!"<br>교수님이 감탄했어요. 🫢✨';
    R(
        '<div class="re">🧪✨</div><div class="rt">마법 물약 조제 실습!</div>'+
        '<div class="rp">📍 무인공방</div>'+
        '<div class="rx">'+tx+'<br><br><em>옐미만의 특별한 물약이 완성되었습니다!</em></div>'+
        '<button class="btn" onclick="s2()">✨ 다음 모험으로!</button>'
    );
}

// ===== Ch.2 점심 (진짜선택 4장) =====
function s2(){
    prog(2);
    R(
        '<div class="si">✦ CHAPTER 2 ✦</div>'+
        '<div class="ct"><span class="em">🍽️</span>마법학교 대식당</div>'+
        '<div class="tx">'+
            '물약 수업을 마치니 배에서 꼬르륵~ 🫢<br><br>'+
            '마법학교 대식당에 도착했더니<br>'+
            '<span class="hl">네 기숙사</span>에서 각각 다른 요리를 준비했대요!<br><br>'+
            '테이블 위에 네 장의 카드가 놓여 있어요.'+
        '</div>'+

        'T12':{em:'🍸✨',ti:'비밀결사 칵테일 연구소!',tx:'지하 계단을 내려가니 은밀한 공간이!<br>마법사가 셰이커를 흔들며 칵테일을 만들어요.<br><br>"이 한 잔에 오늘의 마법을 담았어요."<br>잔에서 보라빛 연기가 피어올라요. 💜🍸'},
        '낭만포차':{em:'🌃✨',ti:'하늘 위 비밀 옥상!',tx:'옥상에 올라서니 홍대의 밤하늘이 펼쳐져요!<br>바람이 살랑~ 불어와요.<br><br>"여기서 보는 하늘이 이렇게 예쁜 줄 몰랐어."<br>옐미가 하늘을 올려다보며 미소 지어요. 🌙💕'},
        '클럽에반스':{em:'🎷✨',ti:'음유시인의 달빛 무대!',tx:'문을 열자 재즈 선율이 옐미를 감싸요.<br>무대 위 음유시인이 노래를 시작해요.<br><br>"이 노래는 오늘 모험을 마친 마법사에게 바칩니다."<br>옐미의 하루가 음악으로 완성돼요. 🎶✨'}
    };
    var d=D[place];
    R('<div class="re">'+d.em+'</div><div class="rt">'+d.ti+'</div><div class="rp">📍 '+place+'</div><div class="rx">'+d.tx+'</div><button class="btn" onclick="ending()">🌟 오늘의 모험을 마무리하기</button>');
}

            '<div style="font-size:60px;margin-bottom:15px">🎓✨🪄</div>'+
            '<div class="et">축하해요, 옐미 마법사!</div>'+

                '이 시간 자체가 마법이었어요. ✨<br><br>'+

            '</div>'+
            '<div class="js"><h3>🗺️ 오늘의 모험 기록</h3>'+jH+'</div>'+

function celebrate(){
    if(!document.getElementById('cfs')){
        var st=document.createElement('style');st.id='cfs';
        st.textContent='@-webkit-keyframes cfall{0%{-webkit-transform:translateY(0) rotate(0);opacity:1}100%{-webkit-transform:translateY(100vh) rotate(720deg);opacity:0}}@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
        document.head.appendChild(st);
    }
    for(var i=0;i<35;i++){
        (function(i){
            setTimeout(function(){
                var p=document.createElement('div');
                var c=['#ffd700','#ff6b9d','#c084fc','#67e8f9','#fbbf24','#34d399'];
                var col=c[Math.floor(Math.random()*c.length)];
                var sz=Math.random()*8+4;
                var br=Math.random()>.5?'50%':'2px';
                var dur=Math.random()*2+2;
                p.style.cssText='position:fixed;left:'+Math.random()*100+'vw;top:-10px;width:'+sz+'px;height:'+sz+'px;background:'+col+';border-radius:'+br+';pointer-events:none;z-index:1000;-webkit-animation:cfall '+dur+'s linear forwards;animation:cfall '+dur+'s linear forwards;';
                document.body.appendChild(p);
                setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p)},4000);
            },i*100);
        })(i);
    }
}

intro();

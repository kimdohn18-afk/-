<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🧙‍♂️ 옐미의 마법학교 입학허가증</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow-x:hidden;}
body{
  min-height:100%;min-height:-webkit-fill-available;
  background:#0a0a2e;color:#e8d5f5;
  font-family:'Gaegu','Apple SD Gothic Neo',sans-serif;
  overflow-x:hidden;position:relative;
}

/* ===== 별 & 반딧불 ===== */
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;}
.ff{position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  -webkit-animation:floatFly 6s ease-in-out infinite;animation:floatFly 6s ease-in-out infinite;}

@-webkit-keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
@-webkit-keyframes floatFly{0%,100%{-webkit-transform:translateY(0) translateX(0)}25%{-webkit-transform:translateY(-30px) translateX(15px)}50%{-webkit-transform:translateY(-10px) translateX(-10px)}75%{-webkit-transform:translateY(-40px) translateX(5px)}}
@keyframes floatFly{0%,100%{transform:translateY(0) translateX(0)}25%{transform:translateY(-30px) translateX(15px)}50%{transform:translateY(-10px) translateX(-10px)}75%{transform:translateY(-40px) translateX(5px)}}

/* ===== 프로그레스 바 ===== */
#progWrap{position:fixed;top:0;left:0;width:100%;height:4px;background:rgba(255,215,0,.15);z-index:100;}
#progBar{height:100%;width:0;background:linear-gradient(90deg,#ffd700,#ffaa00);
  -webkit-transition:width .6s;transition:width .6s;border-radius:0 2px 2px 0;}

/* ===== 컨테이너 & 메인카드 ===== */
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 16px 40px;}
.card{
  background:linear-gradient(160deg,#1a1a4e 0%,#12103a 50%,#1e1650 100%);
  border:1.5px solid rgba(255,215,0,.4);border-radius:20px;
  padding:28px 20px;margin-bottom:20px;position:relative;overflow:hidden;
  -webkit-animation:cardIn .5s ease-out;animation:cardIn .5s ease-out;
}
.card::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.04),transparent);
  -webkit-animation:shimmer 4s ease-in-out infinite;animation:shimmer 4s ease-in-out infinite;
}
@-webkit-keyframes cardIn{from{opacity:0;-webkit-transform:translateY(20px)}to{opacity:1;-webkit-transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@-webkit-keyframes shimmer{0%{left:-100%}50%{left:100%}100%{left:100%}}
@keyframes shimmer{0%{left:-100%}50%{left:100%}100%{left:100%}}

.chap{color:rgba(255,215,0,.6);font-size:12px;letter-spacing:2px;margin-bottom:4px;}
.ttl{color:#ffd700;font-size:22px;font-weight:700;margin-bottom:12px;}
.txt{color:#e8d5f5;font-size:16px;line-height:1.7;margin-bottom:16px;}
.prev{color:#c8a0ff;font-size:14px;font-style:italic;margin-bottom:10px;}

/* ===== 플립 카드 그리드 ===== */
.grid{display:-webkit-flex;display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:16px 0;}
.fc{
  width:calc(50% - 6px);max-width:210px;height:220px;
  -webkit-perspective:1000px;perspective:1000px;cursor:pointer;
}
.fi{
  position:relative;width:100%;height:100%;
  -webkit-transition:-webkit-transform .7s cubic-bezier(.4,.2,.2,1);
  transition:transform .7s cubic-bezier(.4,.2,.2,1);
  -webkit-transform-style:preserve-3d;transform-style:preserve-3d;
}
.fc.flipped .fi{-webkit-transform:rotateY(180deg);transform:rotateY(180deg);}

.ff2,.fb{
  position:absolute;top:0;left:0;width:100%;height:100%;
  -webkit-backface-visibility:hidden;backface-visibility:hidden;
  border-radius:16px;overflow:hidden;
}

/* 카드 앞면 */
.ff2{
  background:linear-gradient(160deg,#1a0a3e,#0d0628,#1a0a3e);
  border:2px solid #ffd700;
  display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  z-index:2;
}
.ff2::before{
  content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;
  border:1px solid rgba(255,215,0,.3);border-radius:12px;pointer-events:none;
}
.ff2::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
  background:
    radial-gradient(circle at 14px 14px,rgba(255,215,0,.35) 0%,transparent 8px),
    radial-gradient(circle at calc(100% - 14px) 14px,rgba(255,215,0,.35) 0%,transparent 8px),
    radial-gradient(circle at 14px calc(100% - 14px),rgba(255,215,0,.35) 0%,transparent 8px),
    radial-gradient(circle at calc(100% - 14px) calc(100% - 14px),rgba(255,215,0,.35) 0%,transparent 8px);
  border-radius:16px;
}
.diamond{
  width:54px;height:54px;border:2px solid rgba(255,215,0,.5);
  -webkit-transform:rotate(45deg);transform:rotate(45deg);
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;margin-bottom:12px;position:relative;
}
.diamond::before{
  content:'';position:absolute;top:4px;left:4px;right:4px;bottom:4px;
  border:1px solid rgba(255,215,0,.25);
}
.diamond .di{-webkit-transform:rotate(-45deg);transform:rotate(-45deg);font-size:20px;}
.fl{color:rgba(255,215,0,.5);font-size:11px;letter-spacing:3px;margin-top:2px;}
.fm{color:#ffd700;font-size:26px;font-weight:700;margin-top:4px;}
.front-shimmer{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.06),transparent);
  -webkit-animation:shimmer 3s ease-in-out infinite;animation:shimmer 3s ease-in-out infinite;
}

/* 카드 뒷면 */
.fb{
  background:linear-gradient(160deg,#1a1a4e,#12103a,#1e1650);
  border:2px solid #ffd700;
  -webkit-transform:rotateY(180deg);transform:rotateY(180deg);
  display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  padding:16px 12px;z-index:1;
}
.fb::before{
  content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;
  border:1px solid rgba(255,215,0,.2);border-radius:12px;pointer-events:none;
}
.bl{width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.4),transparent);margin:4px 0;}
.bi{font-size:32px;margin:6px 0;}
.bd{color:#e8d5f5;font-size:14px;line-height:1.5;text-align:center;margin:4px 0;}
.sb{
  display:none;margin-top:8px;
  background:linear-gradient(135deg,#ffd700,#f0c040);
  border:none;border-radius:20px;padding:10px 22px;
  color:#1a1a2e;font-size:14px;font-weight:700;font-family:'Gaegu',sans-serif;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  box-shadow:0 2px 10px rgba(255,215,0,.3);
  position:relative;z-index:10;
}
.sb:active{-webkit-transform:scale(.96);transform:scale(.96);opacity:.9;}
.fc.flipped .sb{display:inline-block;}

/* ===== 일반 버튼 ===== */
.btn{
  display:inline-block;margin:10px auto;
  background:linear-gradient(135deg,#ffd700,#f0c040);
  border:none;border-radius:30px;padding:14px 36px;
  color:#1a1a2e;font-size:17px;font-weight:700;font-family:'Gaegu',sans-serif;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  box-shadow:0 2px 15px rgba(255,215,0,.3);
}
.btn:active{-webkit-transform:scale(.96);transform:scale(.96);opacity:.9;}
.btnWrap{text-align:center;margin-top:12px;}

/* ===== 결과 카드 ===== */
.result{
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.25);
  border-radius:14px;padding:18px;margin-top:14px;text-align:center;
  -webkit-animation:cardIn .5s ease-out;animation:cardIn .5s ease-out;
}
.ri{font-size:40px;margin-bottom:6px;}
.rt{color:#ffd700;font-size:18px;font-weight:700;margin-bottom:6px;}
.rd{color:#e8d5f5;font-size:15px;line-height:1.6;}
.rp{color:#ffd700;font-size:13px;margin-top:8px;letter-spacing:1px;}

/* ===== 엔딩 ===== */
.jItem{
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);
  border-radius:10px;padding:10px 14px;margin:6px 0;text-align:left;
  color:#e8d5f5;font-size:14px;
}
.jItem .ji{font-size:18px;margin-right:6px;}
.endMsg{
  color:#ffd700;font-size:18px;font-weight:700;line-height:1.7;
  text-align:center;margin-top:20px;
}

/* ===== 축하 파티클 ===== */
.confetti{
  position:fixed;top:-10px;width:8px;height:8px;border-radius:50%;
  z-index:200;pointer-events:none;
  -webkit-animation:cfall linear forwards;animation:cfall linear forwards;
}
@-webkit-keyframes cfall{0%{-webkit-transform:translateY(0) rotate(0);opacity:1}100%{-webkit-transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ===== 반응형 ===== */
@media(max-width:370px){
  .fc{height:200px;}
  .ttl{font-size:19px;}
  .txt{font-size:15px;}
  .bd{font-size:13px;}
}
</style>
</head>
<body>
<div id="progWrap"><div id="progBar"></div></div>
<div id="stars"></div>
<div class="wrap" id="app"></div>

<script>
(function(){
  // ===== 전역 변수 =====
  var J = [];
  var prevChoice = {};
  var skippedCafe = false;
  var TOTAL = 8;

  // ===== 별 생성 =====
  var starBox = document.getElementById('stars');
  for(var i=0;i<70;i++){
    var s=document.createElement('div');
    s.className='star';
    var sz=Math.random()*2+1;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;opacity:'+(Math.random()*.5+.3)+';-webkit-animation:twinkle '+(Math.random()*3+2)+'s ease-in-out infinite;animation:twinkle '+(Math.random()*3+2)+'s ease-in-out infinite;-webkit-animation-delay:'+Math.random()*3+'s;animation-delay:'+Math.random()*3+'s;';
    starBox.appendChild(s);
  }
  // 반딧불
  for(var i=0;i<6;i++){
    var f=document.createElement('div');
    f.className='ff';
    var fSz=Math.random()*4+3;
    f.style.cssText='width:'+fSz+'px;height:'+fSz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;background:rgba(255,215,0,'+(Math.random()*.3+.2)+');box-shadow:0 0 '+(fSz*2)+'px rgba(255,215,0,.3);-webkit-animation-delay:'+Math.random()*4+'s;animation-delay:'+Math.random()*4+'s;-webkit-animation-duration:'+(Math.random()*4+4)+'s;animation-duration:'+(Math.random()*4+4)+'s;';
    document.body.appendChild(f);
  }

  // ===== 유틸 =====
  var app = document.getElementById('app');
  function prog(n){document.getElementById('progBar').style.width=(n/TOTAL*100)+'%';}
  function render(h){app.innerHTML=h;window.scrollTo(0,0);}
  function scrollDown(){setTimeout(function(){window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});},100);}

  // 카드 만들기
  var cardNums = ['Ⅰ','Ⅱ','Ⅲ','Ⅳ'];
  function makeCard(idx,emoji,backIcon,backDesc,delay){
    return '<div class="fc" data-idx="'+idx+'" style="-webkit-animation-delay:'+delay+'s;animation-delay:'+delay+'s;">'+
      '<div class="fi">'+
        '<div class="ff2">'+
          '<div class="front-shimmer"></div>'+
          '<div class="diamond"><span class="di">✦</span></div>'+
          '<div class="fl">MAGIC CARD</div>'+
          '<div class="fm">'+cardNums[idx]+'</div>'+
        '</div>'+
        '<div class="fb">'+
          '<div class="bl"></div>'+
          '<div class="bi">'+backIcon+'</div>'+
          '<div class="bd">'+backDesc+'</div>'+
          '<div class="bl"></div>'+
          '<button class="sb" data-pick="'+idx+'">여기로 갈래!</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  // 플립 이벤트 바인딩
  function bindFlips(containerId, onPick){
    var container = document.getElementById(containerId);
    if(!container) return;
    var cards = container.getElementsByClassName('fc');
    for(var i=0;i<cards.length;i++){
      (function(card){
        card.addEventListener('click',function(e){
          // 버튼 클릭은 무시 (버튼 자체 핸들러에서 처리)
          if(e.target && (e.target.className==='sb' || e.target.getAttribute('data-pick')!==null)){
            return;
          }
          if(card.className.indexOf('flipped')===-1){
            card.className+=' flipped';
          }
        },false);
      })(cards[i]);
    }
    // 버튼 이벤트
    var btns = container.getElementsByClassName('sb');
    for(var j=0;j<btns.length;j++){
      (function(btn){
        btn.addEventListener('click',function(e){
          e.stopPropagation();
          e.preventDefault();
          var pickIdx = parseInt(btn.getAttribute('data-pick'));
          onPick(pickIdx);
        },false);
        // 터치 이벤트도 추가 (카카오톡 인앱 대응)
        btn.addEventListener('touchend',function(e){
          e.stopPropagation();
          e.preventDefault();
          var pickIdx = parseInt(btn.getAttribute('data-pick'));
          onPick(pickIdx);
        },false);
      })(btns[j]);
    }
  }

  // 일반 버튼 바인딩
  function bindBtn(id,fn){
    var b=document.getElementById(id);
    if(!b)return;
    b.addEventListener('click',function(e){e.preventDefault();fn();},false);
    b.addEventListener('touchend',function(e){e.preventDefault();fn();},false);
  }

  // 결과 표시
  function showResult(containerId, icon, title, desc, place, nextFn){
    var c=document.getElementById(containerId);
    if(!c)return;
    var rDiv=document.createElement('div');
    rDiv.className='result';
    rDiv.innerHTML='<div class="ri">'+icon+'</div><div class="rt">'+title+'</div><div class="rd">'+desc+'</div><div class="rp">📍 '+place+'</div><div class="btnWrap"><button class="btn" id="nextBtn">다음으로 →</button></div>';
    c.appendChild(rDiv);
    scrollDown();
    setTimeout(function(){
      bindBtn('nextBtn',nextFn);
    },100);
  }

  // ===== prevChoice 반영 멘트 =====
  function getPrev(stage){
    if(stage==='lunch' && prevChoice.workshop){
      if(prevChoice.workshop===0) return '물약 조제에 온 힘을 쏟았더니 배에서 꼬르륵 소리가...';
      return '연금술에 집중했더니 어느새 점심시간이 지나버렸어요!';
    }
    if(stage==='cafe' && prevChoice.lunch!==undefined){
      var lNames=['이국의 향신료','화덕 육즙','바다 소금 면','비밀 마법 소스'];
      return lNames[prevChoice.lunch]+' 연회의 여운이 아직 남아있네요...';
    }
    if(stage==='activity'){
      if(skippedCafe) return '정령들에게 손을 흔들어 인사만 하고 다음 수업으로 향했어요.';
      return '정령들의 축복을 받으니 온몸에 에너지가 넘쳐요!';
    }
    if(stage==='cafe2' && prevChoice.activity!==undefined){
      var aNames=['환영술 수업','결투 훈련','빛의 시험'];
      return aNames[prevChoice.activity]+'을 마치니 달콤한 게 간절해졌어요...';
    }
    if(stage==='dinner' && prevChoice.cafe2!==undefined){
      var cNames=['비밀 아지트의 크레페','마법사 라운지의 버터비어'];
      return cNames[prevChoice.cafe2]+'의 여운이 남아있지만, 이제 진짜 배고파요!';
    }
    if(stage==='bar' && prevChoice.dinner!==undefined){
      var dNames=['숲속 정원','100년 가정식','별빛 파스타','전설의 화로'];
      return dNames[prevChoice.dinner]+' 만찬이 끝나고, 밤이 깊어져요...';
    }
    return '';
  }

  // =============================================
  //   인트로
  // =============================================
  function intro(){
    prog(0);
    render(
      '<div class="card">'+
        '<div style="text-align:center;font-size:48px;margin-bottom:12px;">🦉</div>'+
        '<div class="ttl" style="text-align:center;">부엉이 한 마리가<br>편지를 물고 왔어요</div>'+
        '<div class="txt" style="text-align:center;">'+
          '"옐미 님께,<br><br>'+
          '당신은 홍대 마법학교에<br>입학이 허가되었습니다.<br><br>'+
          '5월 22일, 마법의 하루가<br>당신을 기다리고 있어요."<br><br>'+
          '<span style="color:#ffd700;">— 홍대 마법학교 교장 드림 🧙‍♂️</span>'+
        '</div>'+
        '<div class="btnWrap"><button class="btn" id="startBtn">✨ 입학허가증 펼치기</button></div>'+
      '</div>'
    );
    bindBtn('startBtn',s1);
  }

  // =============================================
  //  CH.1 무인공방 (가짜선택 2장)
  // =============================================
  function s1(){
    prog(1);
    render(
      '<div class="card">'+
        '<div class="chap">CHAPTER 1</div>'+
        '<div class="ttl">🧪 첫 번째 수업 — 마법 조제실</div>'+
        '<div class="txt">마법학교에 도착하니 교수님이 기다리고 있어요.<br><br>'+
          '"오늘 첫 수업은 직접 마법의 액체를 만드는 거란다. 어떤 방식으로 만들어볼까?"</div>'+
        '<div class="grid" id="s1grid">'+
          makeCard(0,'✦','🧪','과일과 꽃의 정수를 섞어<br>비밀 레시피의 <b>마법 물약</b>을<br>조제해보자',0)+
          makeCard(1,'✦','⚗️','고대 연금술 기법으로<br>금빛 <b>엘릭서</b>를<br>빚어보자',0.1)+
        '</div>'+
      '</div>'
    );
    bindFlips('s1grid',function(idx){
      prevChoice.workshop=idx;
      var resultIcon=idx===0?'🧪':'⚗️';
      var resultTitle=idx===0?'마법 물약 완성!':'황금 엘릭서 완성!';
      var resultDesc=idx===0
        ?'옐미가 조심조심 재료를 섞자,<br>병 속에서 신비한 빛이 피어올라요!'
        :'옐미가 비밀 재료를 한 방울 떨어뜨리자,<br>황금빛 기운이 감돌아요!';
      J.push({emoji:resultIcon,label:resultTitle,place:'무인공방'});
      showResult('s1grid',resultIcon,resultTitle,resultDesc,'무인공방 (담금주 만들기)',s2);
    });
  }

  // =============================================
  //  CH.2 점심 (진짜선택 4장)
  // =============================================
  function s2(){
    prog(2);
    var p=getPrev('lunch');
    render(
      '<div class="card">'+
        '<div class="chap">CHAPTER 2</div>'+
        '<div class="ttl">🍽️ 마법사의 연회</div>'+
        (p?'<div class="prev">'+p+'</div>':'')+
        '<div class="txt">교수님이 말했어요.<br><br>"점심시간이다! 마법학교에는 네 개의 연회장이 있단다. 카드를 뒤집어 마음에 드는 곳을 골라보렴."</div>'+
        '<div class="grid" id="s2grid">'+
          makeCard(0,'✦','🏰','이국의 향신료가 가득한<br><b>신비의 연회장</b>',0)+
